<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef's Weekly Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --ink: #1A1612;
    --ink-light: #4A4440;
    --ink-muted: #8A7E78;
    --gold: #C9923A;
    --gold-light: #E8C07A;
    --gold-pale: #F5EDD8;
    --sage: #5C7A5C;
    --sage-light: #EAF0EA;
    --border: rgba(26,22,18,0.1);
    --border-strong: rgba(26,22,18,0.2);
    --shadow: 0 2px 20px rgba(26,22,18,0.08);
    --shadow-lg: 0 8px 40px rgba(26,22,18,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── NAV ── */
  .top-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,247,242,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    background: none; border: 1px solid var(--border-strong);
    border-radius: 8px; padding: 6px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--ink-light); cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .nav-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  /* ── HERO ── */
  .hero {
    background: var(--ink);
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(201,146,58,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 12px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 42px); font-weight: 700;
    color: white; line-height: 1.15; margin-bottom: 12px;
  }
  .hero p { color: rgba(255,255,255,0.55); font-size: 14px; }
  .week-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px; padding: 8px 16px;
    font-size: 13px; color: rgba(255,255,255,0.7);
    margin-top: 1.25rem;
  }
  .week-dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; }

  /* ── DAY TABS ── */
  .day-strip {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    display: flex; gap: 0; overflow-x: auto;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; padding: 14px 18px;
    font-size: 13px; font-weight: 500;
    color: var(--ink-muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s; white-space: nowrap;
  }
  .day-tab:hover { color: var(--ink); }
  .day-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .day-tab .day-date { display: block; font-size: 11px; font-weight: 300; margin-top: 1px; }

  /* ── MEAL CARDS ── */
  .meals-wrapper { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .meal-section { margin-bottom: 1rem; }
  .meal-time-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 8px; padding-left: 2px;
  }

  .meal-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.25rem 1rem;
    transition: box-shadow 0.2s;
  }
  .meal-card:hover { box-shadow: var(--shadow); }

  .meal-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .meal-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; color: var(--ink); }
  .meal-avg {
    display: flex; align-items: center; gap: 5px;
    background: var(--gold-pale); border-radius: 100px;
    padding: 3px 10px; font-size: 12px; font-weight: 500; color: var(--gold);
    flex-shrink: 0; margin-left: 10px;
  }
  .meal-avg svg { width: 11px; height: 11px; fill: var(--gold); flex-shrink: 0; }
  .meal-desc { font-size: 13px; color: var(--ink-muted); margin-bottom: 1rem; }

  .stars-row { display: flex; align-items: center; gap: 4px; }
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 24px; line-height: 1; padding: 2px;
    color: var(--border-strong); transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .star-btn.lit { color: var(--gold-light); }
  .star-btn.lit.rated { color: var(--gold); }
  .star-btn:hover { transform: scale(1.2); }

  .rating-count { font-size: 12px; color: var(--ink-muted); margin-left: 8px; }

  /* ── COMMENTS SECTION ── */
  .comment-toggle {
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--ink-muted);
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 8px; transition: all 0.2s;
  }
  .comment-toggle:hover { background: var(--sage-light); color: var(--sage); }

  .comment-drawer {
    display: none; margin-top: 1rem; padding-top: 1rem;
    border-top: 1px dashed var(--border);
  }
  .comment-drawer.active { display: block; }

  .comment-list { max-height: 250px; overflow-y: auto; margin-bottom: 12px; padding-right: 4px; }
  .comment-list::-webkit-scrollbar { width: 4px; }
  .comment-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }

  .comment-item {
    font-size: 12px; background: var(--cream);
    padding: 10px 12px; border-radius: 10px; margin-bottom: 8px;
    color: var(--ink-light); line-height: 1.4;
    display: flex; flex-direction: column; gap: 4px;
  }
  .comment-footer {
    display: flex; justify-content: space-between; align-items: center; margin-top: 4px;
  }
  .comment-date { font-size: 9px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  
  .comment-votes { display: flex; align-items: center; gap: 8px; }
  .vote-btn {
    background: none; border: none; cursor: pointer; font-size: 14px; 
    color: var(--ink-muted); display: flex; align-items: center; gap: 3px;
    transition: color 0.2s;
  }
  .vote-btn:hover { color: var(--gold); }
  .vote-count { font-weight: 700; min-width: 10px; text-align: center; }

  .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .comment-input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border-strong);
    border-radius: 10px; font-size: 13px; font-family: inherit; outline: none;
    background: var(--warm-white); transition: border-color 0.2s;
  }
  .comment-input:focus { border-color: var(--gold); }
  .send-btn {
    background: var(--ink); color: white; border: none;
    border-radius: 10px; width: 40px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 16px; transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.9; }

  /* ── QR VIEW ── */
  .qr-section {
    max-width: 440px; margin: 0 auto;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  .qr-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .qr-card h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 6px; }
  #qrcode { display: flex; justify-content: center; margin: 1.5rem 0; }
  .url-input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .url-input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border-strong);
    border-radius: 10px; font-size: 13px; outline: none;
  }
  .gen-btn { padding: 10px 18px; background: var(--ink); color: white; border-radius: 10px; cursor: pointer; }

  /* ── ADMIN VIEW ── */
  .admin-wrap { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .login-box { max-width: 360px; margin: 4rem auto; background: var(--warm-white); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; text-align: center; }
  .field { margin-bottom: 12px; text-align: left; }
  .field label { display: block; font-size: 12px; color: var(--ink-muted); margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 10px; border: 1px solid var(--border-strong); border-radius: 10px; }
  .primary-btn { width: 100%; padding: 12px; background: var(--ink); color: white; border: none; border-radius: 12px; cursor: pointer; }
  .admin-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .admin-tab { padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border-strong); cursor: pointer; background: none; }
  .admin-tab.active { background: var(--ink); color: white; }

  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th, .lb-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
  
  .section-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; border-radius: 100px;
    padding: 10px 20px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">Chef<span>'s</span> Table</div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showView('menu')">Menu</button>
    <button class="nav-btn" onclick="showView('qr')">QR Code</button>
    <button class="nav-btn" onclick="showView('admin')">Admin</button>
  </div>
</nav>

<div id="view-menu" class="view active">
  <div class="hero">
    <div class="hero-eyebrow">This week's offerings</div>
    <h1>Chef's Weekly<br>Menu</h1>
    <div class="week-badge">
      <div class="week-dot"></div>
      <span id="hero-week-label">Loading...</span>
    </div>
  </div>
  <div class="day-strip" id="dayTabs"></div>
  <div class="meals-wrapper" id="mealsContainer"></div>
</div>

<div id="view-qr" class="view">
  <div class="qr-section">
    <div class="qr-card">
      <h2>Generate QR Code</h2>
      <div class="url-input-row">
        <input class="url-input" id="qrUrlInput" type="url" placeholder="https://your-site.com/menu" />
        <button class="gen-btn" onclick="generateQR()">Generate</button>
      </div>
      <div id="qrcode"></div>
    </div>
  </div>
</div>

<div id="view-admin" class="view">
  <div id="adminLogin">
    <div class="login-box">
      <h2>Admin Access</h2>
      <div class="field"><label>Password</label><input type="password" id="adminPass" onkeydown="if(event.key==='Enter')adminLogin()" /></div>
      <button class="primary-btn" onclick="adminLogin()">Sign In</button>
      <div class="err-msg" id="loginErr"></div>
    </div>
  </div>
  <div id="adminDash" style="display:none">
    <div class="admin-wrap">
      <div class="admin-header"><h2>Dashboard</h2><button class="nav-btn" onclick="adminLogout()">Sign out</button></div>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('editor', this)">Edit Menu</button>
        <button class="admin-tab" onclick="switchAdminTab('items', this)">Items</button>
        <button class="admin-tab" onclick="switchAdminTab('leaderboard', this)">Leaderboard</button>
      </div>
      <div id="tab-editor">
        <div class="week-selector"><input type="date" id="weekStartInput" /><button class="nav-btn" onclick="loadEditorWeek()">Load</button></div>
        <div id="dayEditors"></div>
        <button class="primary-btn" onclick="saveWeekMeals()" style="margin-top:20px">Save Menu</button>
      </div>
      <div id="tab-items" style="display:none">
        <div class="section-card" style="padding:1rem"><input type="text" id="newItemName" placeholder="Name" /><button onclick="createCatalogItem()">Add</button></div>
        <div class="section-card"><table class="lb-table"><tbody id="catalogBody"></tbody></table></div>
      </div>
      <div id="tab-leaderboard" style="display:none"><div class="section-card"><table class="lb-table"><tbody id="lbBody"></tbody></table></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDe7cQPav_8tHeHBFQ2atxmtANf9zxvN2M",
  authDomain: "weekly-menu-5bc28.firebaseapp.com",
  databaseURL: "https://weekly-menu-5bc28-default-rtdb.firebaseio.com",
  projectId: "weekly-menu-5bc28",
  storageBucket: "weekly-menu-5bc28.firebasestorage.app",
  messagingSenderId: "936530103301",
  appId: "1:936530103301:web:a74d1fda34ea57ae37a06c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const MEALS = ['Breakfast','Lunch','Dinner'];
let cloudData = { weeks: {}, catalog: [], ratings: {}, password: 'chef1234' };
let activeDay = 0;

db.ref('/').on('value', (snapshot) => {
  if (snapshot.exists()) {
    cloudData = snapshot.val();
    if (!cloudData.weeks) cloudData.weeks = {};
    if (!cloudData.catalog) cloudData.catalog = [];
    if (!cloudData.ratings) cloudData.ratings = {};
  }
  renderMenu();
});

function mealKey(name) { return name ? name.trim().toLowerCase().replace(/[.#$\[\]]/g, "") : "unknown"; }
function currentWeekKey() { 
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function voteComment(mealName, commentId, val) {
  const k = mealKey(mealName);
  const voteRef = db.ref(`ratings/${k}/comments/${commentId}/score`);
  voteRef.transaction((currentScore) => {
    return (currentScore || 0) + val;
  });
  showToast(val > 0 ? "Upvoted!" : "Downvoted!");
}

function postComment(mealName, uiId) {
  const input = document.getElementById('input-' + uiId);
  const text = input.value.trim();
  if (!text) return;
  const k = mealKey(mealName);
  db.ref('ratings/' + k + '/comments').push({ 
    text, 
    ts: Date.now(),
    score: 0 
  });
  input.value = '';
}

function renderMenu() {
  const weekKey = currentWeekKey();
  const meals = cloudData.weeks[weekKey];
  document.getElementById('hero-week-label').textContent = weekKey;

  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = DAYS.map((day, i) => `<div class="day-tab ${i===activeDay?'active':''}" onclick="activeDay=${i};renderMenu()">${day.slice(0,3)}</div>`).join('');

  const container = document.getElementById('mealsContainer');
  if (!meals || !meals[activeDay]) {
    container.innerHTML = '<div class="empty-state"><h3>No meals set for today</h3></div>';
    return;
  }

  container.innerHTML = meals[activeDay].map((meal, mIdx) => {
    if (!meal.name) return '';
    const k = mealKey(meal.name);
    const rData = cloudData.ratings[k] || {};
    const comments = Object.entries(rData.comments || {}).sort((a,b) => b[1].ts - a[1].ts);
    const avg = rData.ratings ? (rData.ratings.reduce((a,b)=>a+b,0)/rData.ratings.length).toFixed(1) : 0;
    const uiId = `${activeDay}-${mIdx}`;

    return `
      <div class="meal-section">
        <div class="meal-time-label">${meal.type}</div>
        <div class="meal-card">
          <div class="meal-card-top">
            <div class="meal-name">${meal.name}</div>
            ${avg > 0 ? `<div class="meal-avg">★ ${avg}</div>` : ''}
          </div>
          <div class="meal-desc">${meal.desc}</div>
          <button class="comment-toggle" onclick="toggleComments('${uiId}')">💬 ${comments.length} Comments</button>
          
          <div class="comment-drawer" id="drawer-${uiId}">
            <div class="comment-list">
              ${comments.map(([id, c]) => `
                <div class="comment-item">
                  <div>${c.text}</div>
                  <div class="comment-footer">
                    <span class="comment-date">${new Date(c.ts).toLocaleDateString()}</span>
                    <div class="comment-votes">
                      <button class="vote-btn" onclick="voteComment('${meal.name}', '${id}', 1)">▲</button>
                      <span class="vote-count">${c.score || 0}</span>
                      <button class="vote-btn" onclick="voteComment('${meal.name}', '${id}', -1)">▼</button>
                    </div>
                  </div>
                </div>
              `).join('') || '<p style="font-size:11px">No comments yet</p>'}
            </div>
            <div class="comment-input-row">
              <input type="text" class="comment-input" id="input-${uiId}" placeholder="Add a comment...">
              <button class="send-btn" onclick="postComment('${meal.name}','${uiId}')">➔</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleComments(id) { document.getElementById('drawer-' + id).classList.toggle('active'); }
function showView(v) { document.querySelectorAll('.view').forEach(el => el.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); }
function generateQR() { 
  const url = document.getElementById('qrUrlInput').value; 
  if(url) { 
    document.getElementById('qrcode').innerHTML = ''; 
    new QRCode(document.getElementById('qrcode'), {text: url, width: 160, height: 160}); 
  } 
}
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

// Admin functions (Simplified for brevity)
let adminLoggedIn = false;
function adminLogin() { if(document.getElementById('adminPass').value === cloudData.password) { adminLoggedIn = true; document.getElementById('adminLogin').style.display='none'; document.getElementById('adminDash').style.display='block'; loadEditorWeek(); } }
function adminLogout() { adminLoggedIn = false; location.reload(); }
function switchAdminTab(t, b) { document.querySelectorAll('.admin-tab').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); document.getElementById('tab-editor').style.display = t==='editor'?'block':'none'; }
function loadEditorWeek() { /* Logic for editor */ }
</script>
</body>
</html>
